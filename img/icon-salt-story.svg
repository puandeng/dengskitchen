<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Salt & Story A: Sourdough on left - top-down view showing ear and scoring -->
  <!-- Book body -->
  <path d="M8 16 Q8 12 12 12 L30 12 Q32 12 32 14 L32 52 Q32 50 30 50 L12 50 Q8 50 8 46 Z" fill="#f5e6d3" stroke="#6b8f5e" stroke-width="1.5"/>
  <path d="M56 16 Q56 12 52 12 L34 12 Q32 12 32 14 L32 52 Q32 50 34 50 L52 50 Q56 50 56 46 Z" fill="#faf8f3" stroke="#6b8f5e" stroke-width="1.5"/>
  <line x1="32" y1="12" x2="32" y2="52" stroke="#6b8f5e" stroke-width="1.5"/>
  <!-- Left page: sourdough boule from top -->
  <ellipse cx="20" cy="32" rx="10" ry="10" fill="#d4a040"/>
  <!-- Flour dusting -->
  <ellipse cx="20" cy="32" rx="9" ry="9" fill="#e8c870" opacity="0.3"/>
  <!-- Score/ear - the signature slash -->
  <path d="M14 28 Q18 26 22 28 Q26 30 28 34" stroke="#8b5e3c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Ear lift (the raised part from scoring) -->
  <path d="M14 28 Q16 24 20 26 Q24 28 26 30" fill="#c48830" opacity="0.5"/>
  <!-- Crust texture dots -->
  <circle cx="16" cy="36" r="0.6" fill="#8b5e3c" opacity="0.4"/>
  <circle cx="22" cy="38" r="0.5" fill="#8b5e3c" opacity="0.3"/>
  <circle cx="24" cy="28" r="0.5" fill="#8b5e3c" opacity="0.3"/>
  <circle cx="18" cy="26" r="0.4" fill="#8b5e3c" opacity="0.3"/>
  <!-- Right page: writing lines -->
  <line x1="36" y1="22" x2="52" y2="22" stroke="#c4b5a0" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="28" x2="50" y2="28" stroke="#c4b5a0" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="34" x2="51" y2="34" stroke="#c4b5a0" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="40" x2="48" y2="40" stroke="#c4b5a0" stroke-width="1" stroke-linecap="round"/>
  <!-- Pen -->
  <g transform="translate(48, 6) rotate(25)">
    <rect x="-1.5" y="0" width="3" height="22" rx="1" fill="#b85c38"/>
    <polygon points="-1.5,22 1.5,22 0,26" fill="#4a3520"/>
    <rect x="-1.5" y="0" width="3" height="3" rx="1" fill="#e8a87c"/>
  </g>
</svg>
